id: re_evaluator
openclaw_agent_id: openclaw-polymarket-re-evaluator
description: Re-evaluation for markets already in Active Research; same quantitative contract as evaluator.
model: null
tools:
  allow:
    - evaluate_market_metrics
input_schema:
  market_id: string
  historic_market_data: list[dict]
output_schema:
  market_id: string
  passed: boolean
  trigger: "string | null"
  confidence_multiplier: float
  details: string
  error: "string | null"
